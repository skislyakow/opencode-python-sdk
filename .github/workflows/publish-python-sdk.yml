name: publish-python-sdk

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.2.21

      - name: Install uv
        shell: bash
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Generate Python SDK from OpenAPI
        shell: bash
        run: |
          ~/.local/bin/uv run --project packages/sdk/python python packages/sdk/python/scripts/generate.py --source cli

      - name: Sync Python dependencies
        shell: bash
        run: |
          ~/.local/bin/uv sync --dev --project packages/sdk/python

      - name: Set version from release tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME:-}"
          if [ -z "$TAG" ]; then
            TAG="$(git describe --tags --abbrev=0 || echo 0.0.0)"
          fi
          VERSION="${TAG#v}"
          echo "Using version: $VERSION"
          echo "__version__ = \"$VERSION\"" > packages/sdk/python/src/opencode_sdk/_version.py

      - name: Build package
        shell: bash
        run: |
          ~/.local/bin/uv build --project packages/sdk/python

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        shell: bash
        run: |
          ~/.local/bin/uv publish --project packages/sdk/python
